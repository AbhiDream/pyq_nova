<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PYQNova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #0b1326;
      --card-bg: #131b2e;
      --border: rgba(255,255,255,0.07);
      --text: #ffffff;
      --text-muted: #8b909f;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --input-bg: #0b1326;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
    }
    .login-container {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      box-sizing: border-box;
      border: 1px solid var(--border);
    }
    .logo-box {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #14B8A6, #0ea5e9);
      box-shadow: 0 8px 16px rgba(20,184,166,0.3);
    }
    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 8px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin: 0 0 32px;
    }
    
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: #1e293b;
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-google:hover {
      background: #334155;
      border-color: rgba(255,255,255,0.2);
    }
    .btn-google img {
      width: 18px;
      height: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-group label a {
      color: var(--primary);
      text-decoration: none;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
    }
    .form-control {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--primary);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .signup-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .signup-text a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-box">
      <img src="/static/logo.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <h1 class="title">Welcome to PYQ Nova</h1>
    <p class="subtitle">Master the past, predict the future.</p>

    <!-- Real Google Auth -->
    <a href="/auth/login" class="btn-google">
      <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/></g></svg>
      Continue with Google
    </a>

    <div class="divider">OR</div>

    <!-- Dummy Form for Visual Parity with screenshot -->
    <form action="#" method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i data-lucide="mail"></i>
          <input type="email" class="form-control" placeholder="name@example.com">
        </div>
      </div>

      <div class="form-group">
        <label>Password <a href="#">Forgot Password?</a></label>
        <div class="input-wrapper">
          <i data-lucide="lock"></i>
          <input type="password" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <button type="button" class="btn-primary">
        Sign In <i data-lucide="arrow-right"></i>
      </button>
    </form>

    <div class="signup-text">
      Don't have an account? <a href="#">Sign Up</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // Check for error in URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('error')) {
      alert("Authentication failed. Please try again.");
    }
  </script>
</body>
</html>
